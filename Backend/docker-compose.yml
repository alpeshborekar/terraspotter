version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: terraspotter_db
    restart: always
    environment:
      POSTGRES_USER: terraspotter
      POSTGRES_PASSWORD: terraspotter123
      POSTGRES_DB: terraspotter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: terraspotter_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: